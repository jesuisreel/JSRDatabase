<!-- Контейнер для таблицы -->
<div id="table-container">Загрузка данных...</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/ВАШ_SCRIPT_ID/exec'; // замените на ваш URL
    
    fetch(API_URL)
        .then(response => response.json())
        .then(data => {
            buildTable(data);
        })
        .catch(error => {
            document.getElementById('table-container').innerHTML = 'Ошибка загрузки данных.';
        });

    function buildTable(data) {
        if (!data || data.length === 0) {
            document.getElementById('table-container').innerHTML = 'Нет данных.';
            return;
        }

        let html = '<table><thead><tr>';
        const headers = Object.keys(data[0]);
        
        headers.forEach(header => {
            html += `<th>${header}</th>`;
        });
        html += '</tr></thead><tbody>';

        data.forEach(row => {
            html += '<tr>';
            headers.forEach(header => {
                html += `<td>${row[header] || ''}</td>`;
            });
            html += '</tr>';
        });
        html += '</tbody></table>';
        
        document.getElementById('table-container').innerHTML = html;
    }
</script>
